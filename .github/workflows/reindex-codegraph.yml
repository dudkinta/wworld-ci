name: Reindex CodeGraph

# Триггерится тремя путями:
# 1. repository_dispatch из сервисных репо (client_payload.service = имя сервиса)
# 2. workflow_dispatch вручную (можно указать scope явно)
# 3. schedule — ночной полный реиндекс (страховка от расхождений)
#
# Action только дописывает scope в /var/lib/codegraph/inbox на Ops; реальный
# реиндекс гоняет systemd-таймер codegraph-drain.timer каждые 60 секунд.
# Это устраняет потерю dispatch'ей при concurrency: cancel-in-progress: false
# (GitHub Actions хранит только 1 pending в группе) — сам append успевает
# отработать до того, как concurrency-логика отменит queued run.
on:
  repository_dispatch:
    types: [reindex-codegraph]
  workflow_dispatch:
    inputs:
      scope:
        description: 'Что реиндексировать (имя сервиса или all)'
        required: false
        default: 'all'
  schedule:
    # Каждую ночь в 03:17 UTC — гарантированный полный реиндекс. На случай,
    # если что-то выпало из inbox'а в течение дня.
    - cron: '17 3 * * *'

concurrency:
  group: reindex-codegraph
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reindex:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Resolve and validate scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_SERVICE: ${{ github.event.client_payload.service }}
          INPUT_SCOPE: ${{ inputs.scope }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            repository_dispatch) SCOPE="${PAYLOAD_SERVICE:-all}" ;;
            workflow_dispatch)   SCOPE="${INPUT_SCOPE:-all}" ;;
            schedule)            SCOPE="all" ;;
            *)                   SCOPE="all" ;;
          esac
          # Whitelist: SCOPE подставляется в shell на Ops — без него RCE через input.
          case "$SCOPE" in
            all|auth-service|catalog-service|content-service|media-service|payment-service|subscription-service|admin-service|notification-service|frontend)
              ;;
            *)
              echo "::error::Invalid scope '$SCOPE'. Allowed: all, <service>-service, frontend."
              exit 1
              ;;
          esac
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Resolved scope='$SCOPE' (event=$EVENT_NAME)"

      - name: Append to inbox on Ops
        uses: appleboy/ssh-action@v1
        env:
          REINDEX_SCOPE: ${{ steps.scope.outputs.scope }}
        with:
          host: ${{ secrets.OPS_DEPLOY_HOST }}
          username: ${{ secrets.OPS_DEPLOY_USER }}
          key: ${{ secrets.OPS_SSH_PRIVATE_KEY }}
          command_timeout: 30s
          envs: REINDEX_SCOPE
          script: |
            set -euo pipefail
            mkdir -p /var/lib/codegraph /var/log
            # Атомарный append. Дренаж подберёт через ≤ 60 сек.
            printf '%s\n' "${REINDEX_SCOPE}" >> /var/lib/codegraph/inbox
            echo "[$(date '+%F %T')] dispatch scope='${REINDEX_SCOPE}' (queued in inbox)" \
              >> /var/log/codegraph-reindex.log
            QSIZE=$(wc -l < /var/lib/codegraph/inbox 2>/dev/null || echo 0)
            echo "Queued scope='${REINDEX_SCOPE}', inbox size=${QSIZE}"
